<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metric Events</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #00d4aa;
            margin-bottom: 20px;
            font-size: 2rem;
        }
        .status {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .status.connected {
            background: #00d4aa;
            color: #1a1a2e;
        }
        .status.disconnected {
            background: #e74c3c;
            color: #fff;
        }
        .status.connecting {
            background: #f39c12;
            color: #1a1a2e;
        }
        .events {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .event {
            background: #16213e;
            border-left: 4px solid #00d4aa;
            padding: 15px 20px;
            border-radius: 0 8px 8px 0;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9rem;
            word-break: break-all;
            animation: slideIn 0.3s ease;
        }
        .event:nth-child(even) {
            border-left-color: #3498db;
        }
        .timestamp {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .empty {
            text-align: center;
            color: #666;
            padding: 40px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Live Metric Events</h1>
        <div id="status" class="status connecting">Connecting...</div>
        <div id="events" class="events">
            <div class="empty">Waiting for events...</div>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const eventsEl = document.getElementById('events');
        const events = [];

        const wsUrl = `ws://${window.location.host}/ws/metrics`;
        let ws = null;

        function connect() {
            statusEl.textContent = 'Connecting...';
            statusEl.className = 'status connecting';

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                statusEl.textContent = 'Connected';
                statusEl.className = 'status connected';
                console.log('WebSocket connected');
            };

            ws.onmessage = (event) => {
                const data = event.data;
                const timestamp = new Date().toLocaleTimeString();
                
                events.unshift({ timestamp, data });
                if (events.length > 100) {
                    events.pop();
                }
                
                renderEvents();
            };

            ws.onclose = () => {
                statusEl.textContent = 'Disconnected';
                statusEl.className = 'status disconnected';
                console.log('WebSocket disconnected, retrying in 3s...');
                setTimeout(connect, 3000);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }

        function renderEvents() {
            if (events.length === 0) {
                eventsEl.innerHTML = '<div class="empty">Waiting for events...</div>';
                return;
            }

            eventsEl.innerHTML = events.map(event => `
                <div class="event">
                    <div class="timestamp">${event.timestamp}</div>
                    <div class="data">${escapeHtml(event.data)}</div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        connect();
    </script>
</body>
</html>
