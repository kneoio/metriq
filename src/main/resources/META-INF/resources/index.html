<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metriq · Live Events</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080810;
            --surface: #0d0d1a;
            --surface2: #12121f;
            --border: rgba(255,255,255,0.06);
            --border-bright: rgba(255,255,255,0.12);
            --accent: #00e5b0;
            --accent2: #7c6dfa;
            --accent3: #fa6d6d;
            --amber: #f5a623;
            --text: #e8e8f0;
            --text-muted: #5a5a72;
            --text-dim: #3a3a52;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'Space Grotesk', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* grid bg */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,229,176,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,176,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* scanline sweep */
        body::after {
            content: '';
            position: fixed;
            left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.4;
            top: -2px;
            animation: scanline 6s linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes scanline {
            to { top: 100vh; }
        }

        .layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            grid-template-rows: auto 1fr;
            min-height: 100vh;
            position: relative;
            z-index: 2;
        }

        /* SIDEBAR */
        .sidebar {
            grid-row: 1 / 3;
            border-right: 1px solid var(--border);
            padding: 32px 0;
            display: flex;
            flex-direction: column;
            background: rgba(13,13,26,0.7);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .logo {
            padding: 0 24px 32px;
            border-bottom: 1px solid var(--border);
        }

        .logo-text {
            font-family: var(--mono);
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 500;
        }

        .logo-sub {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .sidebar-stats {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-label {
            font-family: var(--mono);
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .stat-value {
            font-family: var(--mono);
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--accent);
            line-height: 1;
        }

        .stat-value.amber { color: var(--amber); }
        .stat-value.red { color: var(--accent3); }

        .sidebar-divider {
            height: 1px;
            background: var(--border);
            margin: 8px 24px;
        }

        .filter-section {
            padding: 16px 24px;
        }

        .filter-label {
            font-family: var(--mono);
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .filter-tag {
            font-family: var(--mono);
            font-size: 0.65rem;
            padding: 4px 10px;
            border-radius: 3px;
            border: 1px solid var(--border-bright);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
            background: transparent;
            letter-spacing: 0.5px;
        }

        .filter-tag:hover, .filter-tag.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0,229,176,0.06);
        }

        .status-indicator {
            margin-top: auto;
            padding: 20px 24px;
            border-top: 1px solid var(--border);
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-dim);
            flex-shrink: 0;
            transition: background 0.3s;
        }

        .status-dot.connected {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        .status-dot.disconnected { background: var(--accent3); }
        .status-dot.connecting { background: var(--amber); }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .status-text {
            font-family: var(--mono);
            font-size: 0.65rem;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        /* HEADER */
        .topbar {
            grid-column: 2;
            padding: 24px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(8,8,16,0.8);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .topbar-title {
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 400;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .clear-btn {
            font-family: var(--mono);
            font-size: 0.65rem;
            letter-spacing: 1px;
            color: var(--text-muted);
            background: transparent;
            border: 1px solid var(--border-bright);
            padding: 6px 14px;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
        }

        .clear-btn:hover {
            border-color: var(--accent3);
            color: var(--accent3);
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--mono);
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        /* MAIN */
        .main {
            grid-column: 2;
            padding: 24px 32px;
            overflow-y: auto;
        }

        .events-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        /* EVENT CARD */
        .event-card {
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            background: var(--surface);
            cursor: pointer;
            transition: border-color 0.2s;
            will-change: transform, opacity;
        }

        .event-card:hover {
            border-color: var(--border-bright);
        }

        .event-card.expanded {
            border-color: var(--accent2);
        }

        .event-row {
            display: grid;
            grid-template-columns: 120px max-content 1fr auto auto;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            min-height: 48px;
        }

        .brand-cell {
            font-family: var(--mono);
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--accent2);
            text-transform: uppercase;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .type-cell {
            font-family: var(--mono);
            font-size: 0.65rem;
            letter-spacing: 0.5px;
            color: var(--accent);
            background: rgba(0,229,176,0.08);
            padding: 3px 8px;
            border-radius: 2px;
            text-align: center;
            border: 1px solid rgba(0,229,176,0.2);
            white-space: nowrap;
        }

        .service-cell {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .time-cell {
            font-family: var(--mono);
            font-size: 0.62rem;
            color: var(--text-dim);
            white-space: nowrap;
        }

        .chevron-cell {
            color: var(--text-dim);
            font-size: 0.7rem;
            transition: transform 0.2s;
            width: 16px;
            text-align: center;
        }

        .event-card.expanded .chevron-cell {
            transform: rotate(90deg);
        }

        /* PAYLOAD */
        .event-payload {
            overflow: hidden;
            height: 0;
            border-top: 0px solid var(--border);
        }

        .event-payload.open {
            border-top-width: 1px;
        }

        .payload-inner {
            padding: 16px;
            background: var(--surface2);
        }

        .payload-meta {
            display: flex;
            gap: 24px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .meta-pair {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .meta-key {
            font-family: var(--mono);
            font-size: 0.55rem;
            letter-spacing: 2px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .meta-val {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .payload-json-wrap {
            position: relative;
        }

        .payload-json {
            background: #080810;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 14px;
            font-family: var(--mono);
            font-size: 0.75rem;
            color: #a8b3cf;
            white-space: pre-wrap;
            overflow-x: auto;
            max-height: 260px;
            overflow-y: auto;
            line-height: 1.6;
        }

        .copy-btn {
            position: absolute;
            top: 8px; right: 8px;
            font-family: var(--mono);
            font-size: 0.6rem;
            letter-spacing: 1px;
            background: var(--surface2);
            border: 1px solid var(--border-bright);
            color: var(--text-muted);
            padding: 4px 10px;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
        }

        .copy-btn:hover { color: var(--accent); border-color: var(--accent); }

        /* EMPTY */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 40px;
            gap: 16px;
        }

        .empty-icon {
            width: 48px;
            height: 48px;
            border: 1px solid var(--border-bright);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-size: 1.4rem;
        }

        .empty-text {
            font-family: var(--mono);
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        /* scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

        @media (max-width: 768px) {
            .layout { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .topbar, .main { grid-column: 1; }
            .event-row { grid-template-columns: 1fr auto auto; }
            .service-cell, .type-cell { display: none; }
        }
    </style>
</head>
<body>

<div class="layout">

    <aside class="sidebar">
        <div class="logo">
            <div class="logo-text">metriq</div>
            <div class="logo-sub">event stream</div>
        </div>

        <div class="sidebar-stats">
            <div class="stat-item">
                <span class="stat-label">total received</span>
                <span class="stat-value" id="stat-total">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">last minute</span>
                <span class="stat-value amber" id="stat-rate">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">error types</span>
                <span class="stat-value red" id="stat-errors">0</span>
            </div>
        </div>

        <div class="sidebar-divider"></div>

        <div class="filter-section">
            <div class="filter-label">Filter by type</div>
            <div class="filter-tags" id="filter-tags">
                <span class="filter-tag active" data-filter="all">all</span>
            </div>
        </div>

        <div class="status-indicator">
            <div class="status-row">
                <div class="status-dot" id="status-dot"></div>
                <span class="status-text" id="status-text">connecting</span>
            </div>
        </div>
    </aside>

    <header class="topbar">
        <span class="topbar-title">live event stream</span>
        <div class="topbar-right">
            <button class="clear-btn" id="clear-btn">clear</button>
            <div class="live-badge">
                <div class="live-dot" id="live-dot" style="display:none"></div>
                <span id="live-label">offline</span>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="events-list" id="events-list">
            <div class="empty-state" id="empty-state">
                <div class="empty-icon">⬡</div>
                <div class="empty-text">awaiting events</div>
            </div>
        </div>
    </main>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
    const listEl = document.getElementById('events-list');
    const emptyEl = document.getElementById('empty-state');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const statTotal = document.getElementById('stat-total');
    const statRate = document.getElementById('stat-rate');
    const statErrors = document.getElementById('stat-errors');
    const filterTagsEl = document.getElementById('filter-tags');
    const liveLabel = document.getElementById('live-label');
    const liveDot = document.getElementById('live-dot');
    const clearBtn = document.getElementById('clear-btn');

    let events = [];
    let totalCount = 0;
    let errorCount = 0;
    let recentTimestamps = [];
    let activeFilter = 'all';
    let knownTypes = new Set();
    let ws = null;

    // ── WebSocket ──────────────────────────────────────────
    const wsUrl = `ws://${window.location.host}/metriq/ws/metrics`;

    function connect() {
        setStatus('connecting');
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            setStatus('connected');
        };

        ws.onmessage = (msg) => {
            try {
                const data = JSON.parse(msg.data);
                ingestEvent(data);
            } catch(e) { console.error(e); }
        };

        ws.onclose = () => {
            setStatus('disconnected');
            setTimeout(connect, 3000);
        };

        ws.onerror = () => {};
    }

    function setStatus(s) {
        statusDot.className = 'status-dot ' + s;
        statusText.textContent = s;
        if (s === 'connected') {
            liveDot.style.display = 'block';
            liveLabel.textContent = 'live';
        } else {
            liveDot.style.display = 'none';
            liveLabel.textContent = s;
        }
    }

    // ── Ingest ─────────────────────────────────────────────
    function ingestEvent(data) {
        const now = Date.now();
        totalCount++;
        recentTimestamps.push(now);
        recentTimestamps = recentTimestamps.filter(t => now - t < 60000);

        const type = (data.type || 'UNKNOWN').toUpperCase();
        if (type.includes('ERROR') || type.includes('FAIL')) errorCount++;

        // update type filters
        if (!knownTypes.has(type)) {
            knownTypes.add(type);
            addFilterTag(type);
        }

        // update stats with GSAP counter animation
        animateNumber(statTotal, totalCount);
        animateNumber(statRate, recentTimestamps.length);
        animateNumber(statErrors, errorCount);

        const entry = { data, receivedAt: new Date(), id: now + Math.random() };
        events.unshift(entry);
        if (events.length > 100) events.pop();

        // hide empty state
        if (emptyEl.parentNode) {
            gsap.to(emptyEl, { opacity: 0, y: -8, duration: 0.2, onComplete: () => emptyEl.remove() });
        }

        if (activeFilter === 'all' || activeFilter === type) {
            prependCard(entry);
        }
    }

    function animateNumber(el, value) {
        const current = parseInt(el.textContent) || 0;
        gsap.to({ v: current }, {
            v: value,
            duration: 0.4,
            ease: 'power2.out',
            onUpdate: function() {
                el.textContent = Math.round(this.targets()[0].v);
            }
        });
    }

    // ── Render card ────────────────────────────────────────
    function prependCard(entry) {
        const e = entry.data;
        const type = (e.type || 'UNKNOWN').toUpperCase();
        const isError = type.includes('ERROR') || type.includes('FAIL');

        const card = document.createElement('div');
        card.className = 'event-card';
        card.dataset.type = type;
        card.dataset.id = entry.id;

        card.innerHTML = `
            <div class="event-row">
                <span class="brand-cell">${esc(e.brandName || '—')}</span>
                <span class="type-cell" style="${isError ? 'color:var(--accent3);background:rgba(250,109,109,0.08);border-color:rgba(250,109,109,0.2)' : ''}">${esc(type)}</span>
                <span class="service-cell">${esc(e.serviceId || e.traceId || '—')}</span>
                <span class="time-cell">${entry.receivedAt.toLocaleTimeString()}</span>
                <span class="chevron-cell">›</span>
            </div>
            <div class="event-payload" id="payload-${entry.id}">
                <div class="payload-inner">
                    <div class="payload-meta">
                        <div class="meta-pair">
                            <span class="meta-key">trace id</span>
                            <span class="meta-val">${esc(e.traceId || '—')}</span>
                        </div>
                        <div class="meta-pair">
                            <span class="meta-key">timestamp</span>
                            <span class="meta-val">${formatTs(e.timestamp)}</span>
                        </div>
                        <div class="meta-pair">
                            <span class="meta-key">received</span>
                            <span class="meta-val">${entry.receivedAt.toLocaleTimeString()}</span>
                        </div>
                    </div>
                    <div class="payload-json-wrap">
                        <pre class="payload-json">${esc(JSON.stringify(e.payload, null, 2) || 'null')}</pre>
                        <button class="copy-btn" onclick="copyJson(this, ${JSON.stringify(JSON.stringify(e.payload, null, 2))})">copy</button>
                    </div>
                </div>
            </div>
        `;

        // expand / collapse on click
        card.querySelector('.event-row').addEventListener('click', () => toggleCard(card, entry.id));

        listEl.insertBefore(card, listEl.firstChild);

        // GSAP entrance: slide in from top + flash border
        gsap.fromTo(card,
            { opacity: 0, y: -12, scaleY: 0.95 },
            { opacity: 1, y: 0, scaleY: 1, duration: 0.35, ease: 'power3.out', transformOrigin: 'top center' }
        );

        // brief border flash on new card
        gsap.fromTo(card,
            { borderColor: isError ? 'rgba(250,109,109,0.8)' : 'rgba(0,229,176,0.8)' },
            { borderColor: 'rgba(255,255,255,0.06)', duration: 1.2, ease: 'power2.out', delay: 0.1 }
        );

        // cap DOM cards at 50
        const allCards = listEl.querySelectorAll('.event-card');
        if (allCards.length > 50) {
            const last = allCards[allCards.length - 1];
            gsap.to(last, { opacity: 0, height: 0, duration: 0.2, onComplete: () => last.remove() });
        }
    }

    // ── Expand / collapse ──────────────────────────────────
    function toggleCard(card, id) {
        const payloadEl = document.getElementById('payload-' + id);
        const isOpen = card.classList.contains('expanded');

        if (isOpen) {
            gsap.to(payloadEl, {
                height: 0,
                duration: 0.3,
                ease: 'power2.inOut',
                onComplete: () => payloadEl.classList.remove('open')
            });
            card.classList.remove('expanded');
        } else {
            payloadEl.classList.add('open');
            const naturalH = payloadEl.scrollHeight;
            gsap.fromTo(payloadEl,
                { height: 0 },
                { height: naturalH, duration: 0.35, ease: 'power2.out',
                  onComplete: () => gsap.set(payloadEl, { height: 'auto' }) }
            );
            // stagger inner items
            gsap.fromTo(payloadEl.querySelectorAll('.meta-pair, .payload-json-wrap'),
                { opacity: 0, y: 6 },
                { opacity: 1, y: 0, duration: 0.25, stagger: 0.05, ease: 'power2.out', delay: 0.1 }
            );
            card.classList.add('expanded');
        }
    }

    // ── Filter tags ────────────────────────────────────────
    function addFilterTag(type) {
        const tag = document.createElement('span');
        tag.className = 'filter-tag';
        tag.textContent = type.toLowerCase();
        tag.dataset.filter = type;
        tag.addEventListener('click', () => setFilter(type, tag));
        filterTagsEl.appendChild(tag);
        gsap.fromTo(tag, { opacity: 0, scale: 0.8 }, { opacity: 1, scale: 1, duration: 0.2, ease: 'back.out(2)' });
    }

    function setFilter(type, tagEl) {
        activeFilter = type;
        filterTagsEl.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
        tagEl.classList.add('active');
        rerenderList();
    }

    document.querySelector('[data-filter="all"]').addEventListener('click', function() {
        setFilter('all', this);
    });

    function rerenderList() {
        listEl.innerHTML = '';
        const filtered = activeFilter === 'all'
            ? events
            : events.filter(e => (e.data.type || 'UNKNOWN').toUpperCase() === activeFilter);

        if (filtered.length === 0) {
            listEl.appendChild(emptyEl);
            gsap.fromTo(emptyEl, { opacity: 0 }, { opacity: 1, duration: 0.3 });
            return;
        }

        filtered.forEach((entry, i) => {
            prependCardSilent(entry, i);
        });
    }

    function prependCardSilent(entry, index) {
        const e = entry.data;
        const type = (e.type || 'UNKNOWN').toUpperCase();
        const isError = type.includes('ERROR') || type.includes('FAIL');

        const card = document.createElement('div');
        card.className = 'event-card';
        card.dataset.type = type;
        card.dataset.id = entry.id;

        card.innerHTML = `
            <div class="event-row">
                <span class="brand-cell">${esc(e.brandName || '—')}</span>
                <span class="type-cell" style="${isError ? 'color:var(--accent3);background:rgba(250,109,109,0.08);border-color:rgba(250,109,109,0.2)' : ''}">${esc(type)}</span>
                <span class="service-cell">${esc(e.serviceId || e.traceId || '—')}</span>
                <span class="time-cell">${entry.receivedAt.toLocaleTimeString()}</span>
                <span class="chevron-cell">›</span>
            </div>
            <div class="event-payload" id="payload-${entry.id}">
                <div class="payload-inner">
                    <div class="payload-meta">
                        <div class="meta-pair">
                            <span class="meta-key">trace id</span>
                            <span class="meta-val">${esc(e.traceId || '—')}</span>
                        </div>
                        <div class="meta-pair">
                            <span class="meta-key">timestamp</span>
                            <span class="meta-val">${formatTs(e.timestamp)}</span>
                        </div>
                        <div class="meta-pair">
                            <span class="meta-key">received</span>
                            <span class="meta-val">${entry.receivedAt.toLocaleTimeString()}</span>
                        </div>
                    </div>
                    <div class="payload-json-wrap">
                        <pre class="payload-json">${esc(JSON.stringify(e.payload, null, 2) || 'null')}</pre>
                        <button class="copy-btn" onclick="copyJson(this, ${JSON.stringify(JSON.stringify(e.payload, null, 2))})">copy</button>
                    </div>
                </div>
            </div>
        `;

        card.querySelector('.event-row').addEventListener('click', () => toggleCard(card, entry.id));
        listEl.appendChild(card);

        gsap.fromTo(card,
            { opacity: 0, x: -8 },
            { opacity: 1, x: 0, duration: 0.25, delay: index * 0.025, ease: 'power2.out' }
        );
    }

    // ── Clear ──────────────────────────────────────────────
    clearBtn.addEventListener('click', () => {
        const cards = listEl.querySelectorAll('.event-card');
        gsap.to(cards, {
            opacity: 0, x: 16, duration: 0.2, stagger: 0.02, ease: 'power2.in',
            onComplete: () => {
                events = [];
                totalCount = 0; errorCount = 0; recentTimestamps = [];
                listEl.innerHTML = '';
                listEl.appendChild(emptyEl);
                gsap.fromTo(emptyEl, { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.3 });
                statTotal.textContent = '0';
                statRate.textContent = '0';
                statErrors.textContent = '0';
            }
        });
    });

    // ── Helpers ────────────────────────────────────────────
    function esc(str) {
        if (str == null) return '';
        const d = document.createElement('div');
        d.textContent = String(str);
        return d.innerHTML;
    }

    function formatTs(ts) {
        if (typeof ts === 'number') {
            const s = Math.floor(ts);
            const ms = Math.round((ts - s) * 1000);
            return new Date(s * 1000 + ms).toLocaleString();
        }
        return ts || '—';
    }

    function copyJson(btn, json) {
        navigator.clipboard.writeText(json || '').then(() => {
            const orig = btn.textContent;
            btn.textContent = 'copied';
            gsap.fromTo(btn, { color: 'var(--accent)' }, { color: 'var(--text-muted)', duration: 1.5, delay: 0.8 });
            setTimeout(() => btn.textContent = orig, 2000);
        }).catch(() => { btn.textContent = 'failed'; setTimeout(() => btn.textContent = 'copy', 2000); });
    }

    // ── Page entrance ──────────────────────────────────────
    gsap.from('.sidebar', { x: -20, opacity: 0, duration: 0.6, ease: 'power3.out' });
    gsap.from('.topbar', { y: -10, opacity: 0, duration: 0.5, delay: 0.15, ease: 'power3.out' });
    gsap.from('.stat-item', { y: 10, opacity: 0, duration: 0.4, stagger: 0.08, delay: 0.3, ease: 'power2.out' });

    connect();
</script>
</body>
</html>
